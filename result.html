<script>
// openDB is now in js/utils.js?v=8

function animateValue(el,target,duration){
  const start=performance.now();
  function tick(now){
    const p=Math.min((now-start)/duration,1);
    const ease=1-Math.pow(1-p,3);
    el.textContent=Math.round(ease*target);
    if(p<1)requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
}

async function loadAndRender(){
  const db=await openDB();
  const tx=db.transaction('videos','readonly');
  const req=tx.objectStore('videos').get('result');
  req.onsuccess=()=>{
    const data=req.result;
    if(!data){document.querySelector('h1').textContent='未找到分析结果';return}
    _shareData=data;
    renderScores(data);
    renderAudioAlign(data);
    renderTimeline(data.segments);
  };
}

function renderScores(data){
  // Main ring: circumference = 2*PI*70 ≈ 440
  const circumference=2*Math.PI*70;
  const mainRing=document.getElementById('mainRing');
  setTimeout(()=>{
    mainRing.style.strokeDashoffset=circumference*(1-data.total/100);
  },300);
  animateValue(document.getElementById('mainScore'),data.total,1500);

  // Badge
  const badge=document.getElementById('scoreBadge');
  const badgeText=document.getElementById('badgeText');
  // Simple percentile estimate
  let pct=Math.min(99,Math.max(10,Math.round(data.total*0.9+5)));
  badge.style.display='inline-flex';
  badgeText.textContent='超过 '+pct+'% 的舞者 🎉';

  // Dimension rings: circumference = 2*PI*24 ≈ 150
  const dimCirc=2*Math.PI*24;
  const dims=[
    ['dimA','dimAv',data.accuracy,'#8B5CF6'],
    ['dimExt','dimExtv',data.extension||0,'#10B981'],
    ['dimB','dimBv',data.fluency,'#EC4899'],
    ['dimC','dimCv',data.rhythm,'#F97316']
  ];
  dims.forEach(([ringId,valId,score])=>{
    const off=dimCirc*(1-score/100);
    const ring=document.getElementById(ringId);
    ring.style.strokeDashoffset='150';
    setTimeout(()=>{ring.style.strokeDashoffset=off;},300);
    animateValue(document.getElementById(valId),score,1800);
  });
}

function renderAudioAlign(data){
  const info=data.audioAlign;
  const el=document.getElementById('audioAlignInfo');
  if(!info){el.style.display='none';return;}
  el.style.display='block';
  const det=document.getElementById('alignDetail');
  if(info.used){
    const ratioTxt=info.tempoRatio!==1.0?`检测到音乐变速 ${info.tempoRatio}x，已自动对齐 · `:''; 
    det.innerHTML=`${ratioTxt}音乐匹配度 ${info.confidence}% · 有效对比 ${data.effectiveDuration||'?'}s（教师 ${data.teacherDuration||'?'}s，学生 ${data.studentDuration||'?'}s）`;
  }else{
    document.getElementById('alignTitle').textContent='动作对齐';
    det.textContent=info.fallbackReason||'已使用动作对齐模式';
    el.style.background='rgba(249,115,22,0.08)';
    document.getElementById('alignTitle').style.color='#F97316';
  }
}

function renderTimeline(segments){
  const tl=document.getElementById('timeline');
  if(!segments||!segments.length)return;
  segments.forEach((seg,i)=>{
    const wrapper=document.createElement('div');
    wrapper.style.cssText='margin-bottom:16px';
    const startSec=seg.startTime!=null?seg.startTime:i*8;
    const endSec=seg.endTime!=null?seg.endTime:(startSec+8);
    let color,textColor;
    if(seg.score>=80){color='linear-gradient(90deg,#10B981,#34D399)';textColor='#10B981'}
    else if(seg.score>=60){color='linear-gradient(90deg,#EAB308,#F97316)';textColor='#D97706'}
    else{color='linear-gradient(90deg,#F97316,#EF4444)';textColor='#EF4444'}
    // Bar row
    wrapper.innerHTML=`
      <div class="tl-row">
        <span class="tl-label">${startSec}-${endSec}s</span>
        <div class="tl-bar-bg"><div class="tl-bar" style="width:${seg.score}%;background:${color}"></div></div>
        <span class="tl-score" style="color:${textColor}">${seg.score}</span>
      </div>
      <div style="display:flex;gap:8px;margin:4px 0 0 66px;flex-wrap:wrap">
        ${seg.accuracy!=null?`<span class="seg-tag" style="color:#8B5CF6;border-color:#8B5CF6">准确 ${seg.accuracy}</span>`:''}
        ${seg.extension!=null?`<span class="seg-tag" style="color:#10B981;border-color:#10B981">延展 ${seg.extension}</span>`:''}
        ${seg.fluency!=null?`<span class="seg-tag" style="color:#EC4899;border-color:#EC4899">流畅 ${seg.fluency}</span>`:''}
        ${seg.rhythm!=null?`<span class="seg-tag" style="color:#F97316;border-color:#F97316">节奏 ${seg.rhythm}</span>`:''}
      </div>`;
    tl.appendChild(wrapper);
  });
}


// ─── Share Functions ────────────────────────────────────────────
let _shareData = null;

function toggleShareMenu() {
  const menu = document.getElementById('shareMenu');
  menu.style.display = menu.style.display === 'none' ? 'block' : 'none';
}
// Close menu on outside click
document.addEventListener('click', (e) => {
  const menu = document.getElementById('shareMenu');
  const btn = document.getElementById('shareBtn');
  if (menu && btn && !menu.contains(e.target) && !btn.contains(e.target)) {
    menu.style.display = 'none';
  }
});
 // cached result data for sharing

function shareLink() {
  if (!_shareData) { alert('评分数据未加载'); return; }
  // Encode key scores into URL params
  const params = new URLSearchParams({
    t: _shareData.total,
    a: _shareData.accuracy,
    x: _shareData.extension || 0,
    f: _shareData.fluency,
    r: _shareData.rhythm
  });
  const url = window.location.origin + '/result?' + params.toString();
  
  if (navigator.clipboard) {
    navigator.clipboard.writeText(url).then(() => {
      showToast('链接已复制到剪贴板 ✅');
    }).catch(() => {
      fallbackCopy(url);
    });
  } else {
    fallbackCopy(url);
  }
}

function fallbackCopy(text) {
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.cssText = 'position:fixed;left:-9999px';
  document.body.appendChild(ta);
  ta.select();
  document.execCommand('copy');
  document.body.removeChild(ta);
  showToast('链接已复制到剪贴板 ✅');
}

function showToast(msg) {
  let toast = document.getElementById('toast');
  if (!toast) {
    toast = document.createElement('div');
    toast.id = 'toast';
    toast.style.cssText = 'position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.8);color:#fff;padding:12px 24px;border-radius:24px;font-size:14px;font-weight:600;z-index:999;transition:opacity 0.3s;white-space:nowrap';
    document.body.appendChild(toast);
  }
  toast.textContent = msg;
  toast.style.opacity = '1';
  setTimeout(() => { toast.style.opacity = '0'; }, 2500);
}

    document.body.appendChild(script);
    await new Promise((res, rej) => { script.onload = res; script.onerror = rej; });
  }
  
  try {
    const container = document.querySelector('.container') || document.body;
    
    // === PRE-SCREENSHOT: replace SVG rings with CSS-only elements ===
    // html2canvas can't render SVG stroke-dashoffset, so we overlay plain HTML
    
    const d = _shareData;
    if (!d) { showToast('评分数据未加载'); return; }
    
    // 1. Replace main score ring with a CSS gradient circle
    const scoreSection = document.querySelector('.score-section');
    const origScoreHTML = scoreSection.innerHTML;
    const pct = d.total;
    scoreSection.innerHTML = `
      <div style="text-align:center;margin:0 auto;padding:16px 0">
        <span style="font-size:72px;font-weight:800;background:linear-gradient(135deg,#8B5CF6,#EC4899);-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1">${pct}</span>
      </div>
      <div style="font-size:15px;color:#6B6E7B;font-weight:600;text-align:center;margin-top:8px">综合评分</div>
      <div style="font-size:12px;color:#9B9EAB;margin-top:2px;text-align:center">满分 100 · 入门 40 · 进阶 70 · 专业 90</div>
      <div style="display:inline-flex;align-items:center;gap:4px;background:linear-gradient(135deg,#8B5CF6,#EC4899);color:#fff;padding:6px 16px;border-radius:20px;font-size:13px;font-weight:600;margin-top:8px">
        ★ 超过 ${Math.min(99,Math.max(10,Math.round(pct*0.9+5)))}% 的舞者
      </div>`;
    
    // 2. Replace dimension rings with CSS circles
    const dimsContainer = document.querySelector('.dims');
    const origDimsHTML = dimsContainer.innerHTML;
    const dimData = [
      { label: '动作准确度', score: d.accuracy, color: '#8B5CF6',
        icon: '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#8B5CF6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2" fill="#8B5CF6"/></svg>' },
      { label: '延展性', score: d.extension || 0, color: '#10B981',
        icon: '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#10B981" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"/></svg>' },
      { label: '流畅度', score: d.fluency, color: '#EC4899',
        icon: '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#EC4899" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12c2-4 4-4 6 0s4 4 6 0 4-4 6 0"/></svg>' },
      { label: '节奏感', score: d.rhythm, color: '#F97316',
        icon: '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#F97316" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>' },
    ];
    dimsContainer.innerHTML = dimData.map(dd => {
      const deg = Math.round(dd.score / 100 * 360);
      return `<div style="text-align:center;flex:1">
        <div style="display:flex;justify-content:center;margin-bottom:2px">${dd.icon}</div>
        <div style="font-size:20px;font-weight:700;color:${dd.color}">${dd.score}</div>
        <div style="font-size:11px;color:#6B6E7B;margin-top:2px;font-weight:500">${dd.label}</div>
      </div>`;
    }).join('');
    
    // 4. Hide elements we don't want in the image
    const hideEls = [];
    // Hide buttons
    document.querySelectorAll('.btns').forEach(el => {
      hideEls.push({ el, orig: el.style.display });
      el.style.display = 'none';
    });
    // Hide back link
    container.querySelectorAll('a[href="upload.html"]').forEach(el => {
      hideEls.push({ el, orig: el.style.display });
      el.style.display = 'none';
    });
    // Hide skeleton section
    document.querySelectorAll('.section-title').forEach(el => {
      if (el.textContent.includes('骨架')) {
        hideEls.push({ el, orig: el.style.display });
        el.style.display = 'none';
        if (el.nextElementSibling) {
          hideEls.push({ el: el.nextElementSibling, orig: el.nextElementSibling.style.display });
          el.nextElementSibling.style.display = 'none';
        }
      }
    });
    document.querySelectorAll('.coming-soon-bar').forEach(el => {
      hideEls.push({ el, orig: el.style.display });
      el.style.display = 'none';
    });
    // Hide share menu if open
    const shareMenu = document.getElementById('shareMenu');
    if (shareMenu) {
      hideEls.push({ el: shareMenu, orig: shareMenu.style.display });
      shareMenu.style.display = 'none';
    }
    
    // 5. Add temporary watermark
    const watermark = document.createElement('div');
    watermark.style.cssText = 'text-align:center;padding:20px 0 28px;font-size:13px;color:#9B9EAB;font-weight:500';
    watermark.textContent = '舞韵星迹 · DanceFlow';
    container.appendChild(watermark);
    
    // === CAPTURE ===
    // Force browser repaint with double rAF + timeout
    await new Promise(r => requestAnimationFrame(() => requestAnimationFrame(() => setTimeout(r, 300))));
    
    const canvas = await html2canvas(container, {
      backgroundColor: '#F8F9FC',
      scale: 2,
      useCORS: true,
      logging: false
    });
    
    // === POST-SCREENSHOT: restore everything ===
    watermark.remove();
    hideEls.forEach(({ el, orig }) => { el.style.display = orig; });
    scoreSection.innerHTML = origScoreHTML;
    dimsContainer.innerHTML = origDimsHTML;
    // Re-trigger animations
    if (typeof renderScores === 'function' && _shareData) renderScores(_shareData);
    
    // === OUTPUT ===
    canvas.toBlob(async (blob) => {
      try {
        if (navigator.clipboard && navigator.clipboard.write) {
          await navigator.clipboard.write([new ClipboardItem({ 'image/png': blob })]);
          showToast('长图已复制到剪贴板 📋');
          return;
        }
      } catch(e) { console.log('Clipboard failed:', e); }
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a'); a.href = url; a.download = 'danceflow-score.png'; a.click();
      showToast('长图已保存 📸');
      setTimeout(() => URL.revokeObjectURL(url), 5000);
    }, 'image/png');
    
  } catch(e) {
    console.error(e);
    showToast('生成失败，请截屏分享');
  }
}

async function downloadImage(url, blob) {
  // Try to copy image to clipboard first
  try {
    if (navigator.clipboard && navigator.clipboard.write) {
      const clipBlob = blob || await fetch(url).then(r => r.blob());
      await navigator.clipboard.write([
        new ClipboardItem({ 'image/png': clipBlob })
      ]);
      showToast('长图已复制到剪贴板 📋');
      return;
    }
  } catch(e) {
    console.log('Clipboard write failed, falling back to download', e);
  }
  // Fallback: download file
  const a = document.createElement('a');
  a.href = url;
  a.download = 'danceflow-score.png';
  a.click();
  showToast('长图已保存到相册 📸');
  setTimeout(() => URL.revokeObjectURL(url), 5000);
}

function shareToWechat() {
  if (!_shareData) { alert('评分数据未加载'); return; }
  
  // On mobile: try native share API
  if (navigator.share) {
    navigator.share({
      title: '舞韵星迹评分',
      text: `我在舞韵星迹获得了 ${_shareData.total} 分！准确度${_shareData.accuracy} 延展性${_shareData.extension||'-'} 流畅度${_shareData.fluency} 节奏感${_shareData.rhythm}`,
      url: window.location.href
    }).catch(() => {
      showToast('请长按生成的长图分享到微信');
      generateShareImage();
    });
    return;
  }
  
  // Desktop fallback: generate image and prompt user
  showToast('生成长图后保存，打开微信分享 💬');
  generateShareImage();
}


loadAndRender();
</script>
