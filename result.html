<!DOCTYPE html>

<body>
<!-- Shared SVG defs -->
<svg width="0" height="0" style="position:absolute">

<div class="container" style="align-items:stretch;padding-bottom:40px">

      </div>

        <div class="dim-val" style="color:#8B5CF6" id="dimAv">0</div>

    <div class="dim-card">

      <div class="dim-ring">
        <svg viewBox="0 0 56 56"><circle cx="28" cy="28" r="24" class="dim-bg"/><circle cx="28" cy="28" r="24" class="dim-fill" stroke="#10B981" id="dimExt" stroke-dashoffset="150" style="--off:150"/></svg>

    <div class="dim-card">

<script>
// openDB is now in js/utils.js?v=8

function animateValue(el,target,duration){
  const start=performance.now();
  function tick(now){
    const p=Math.min((now-start)/duration,1);
    const ease=1-Math.pow(1-p,3);
    el.textContent=Math.round(ease*target);
    if(p<1)requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
}

async function loadAndRender(){
  const db=await openDB();
  const tx=db.transaction('videos','readonly');
  const req=tx.objectStore('videos').get('result');
  req.onsuccess=()=>{
    const data=req.result;
    if(!data){document.querySelector('h1').textContent='未找到分析结果';return}
    _shareData=data;
    renderScores(data);
    renderAudioAlign(data);
    renderTimeline(data.segments);
    initSkeleton(data);
  };
}

function renderScores(data){
  // Main ring: circumference = 2*PI*70 ≈ 440
  const circumference=2*Math.PI*70;
  const mainRing=document.getElementById('mainRing');
  setTimeout(()=>{
    mainRing.style.strokeDashoffset=circumference*(1-data.total/100);
  },300);
  animateValue(document.getElementById('mainScore'),data.total,1500);

  // Badge
  const badge=document.getElementById('scoreBadge');
  const badgeText=document.getElementById('badgeText');
  // Simple percentile estimate
  let pct=Math.min(99,Math.max(10,Math.round(data.total*0.9+5)));
  badge.style.display='inline-flex';
  badgeText.textContent='超过 '+pct+'% 的舞者 🎉';

  // Dimension rings: circumference = 2*PI*24 ≈ 150
  const dimCirc=2*Math.PI*24;
  const dims=[
    ['dimA','dimAv',data.accuracy,'#8B5CF6'],
    ['dimExt','dimExtv',data.extension||0,'#10B981'],
    ['dimB','dimBv',data.fluency,'#EC4899'],
    ['dimC','dimCv',data.rhythm,'#F97316']
  ];
  dims.forEach(([ringId,valId,score])=>{
    const off=dimCirc*(1-score/100);
    const ring=document.getElementById(ringId);
    ring.style.strokeDashoffset='150';
    setTimeout(()=>{ring.style.strokeDashoffset=off;},300);
    animateValue(document.getElementById(valId),score,1800);
  });
}

function renderAudioAlign(data){
  const info=data.audioAlign;
  const el=document.getElementById('audioAlignInfo');
  if(!info){el.style.display='none';return;}
  el.style.display='block';
  const det=document.getElementById('alignDetail');
  if(info.used){
    const ratioTxt=info.tempoRatio!==1.0?`检测到音乐变速 ${info.tempoRatio}x，已自动对齐 · `:''; 
    det.innerHTML=`${ratioTxt}音乐匹配度 ${info.confidence}% · 有效对比 ${data.effectiveDuration||'?'}s（教师 ${data.teacherDuration||'?'}s，学生 ${data.studentDuration||'?'}s）`;
  }else{
    document.getElementById('alignTitle').textContent='动作对齐';
    det.textContent=info.fallbackReason||'已使用动作对齐模式';
    el.style.background='rgba(249,115,22,0.08)';
    document.getElementById('alignTitle').style.color='#F97316';
  }
}

function renderTimeline(segments){
  const tl=document.getElementById('timeline');
  if(!segments||!segments.length)return;
  segments.forEach((seg,i)=>{
    const wrapper=document.createElement('div');
    wrapper.style.cssText='margin-bottom:16px';
    const startSec=seg.startTime!=null?seg.startTime:i*8;
    const endSec=seg.endTime!=null?seg.endTime:(startSec+8);
    let color,textColor;
    if(seg.score>=80){color='linear-gradient(90deg,#10B981,#34D399)';textColor='#10B981'}
    else if(seg.score>=60){color='linear-gradient(90deg,#EAB308,#F97316)';textColor='#D97706'}
    else{color='linear-gradient(90deg,#F97316,#EF4444)';textColor='#EF4444'}
    // Bar row
    wrapper.innerHTML=`
      <div class="tl-row">
        <span class="tl-label">${startSec}-${endSec}s</span>
        <div class="tl-bar-bg"><div class="tl-bar" style="width:${seg.score}%;background:${color}"></div></div>
        <span class="tl-score" style="color:${textColor}">${seg.score}</span>
      </div>
      <div style="display:flex;gap:8px;margin:4px 0 0 66px;flex-wrap:wrap">

// ─── Skeleton Comparison ────────────────────────────────────────
let _skeletonPlaying = false;
let _skeletonAnimId = null;
let _teacherFrames = null;
let _studentFrames = null;
let _mappedIndices = null;
let _audioCtx = null;
let _audioBuffer = null;
let _audioSource = null;
let _audioStartTime = 0;
let _audioPauseOffset = 0;
let _playSpeed = 1;

function initSkeleton(data) {
  if (!data.teacherFrames || !data.studentFrames) return;
  if (data.teacherFrames.length < 2 || data.studentFrames.length < 2) return;
  
  _teacherFrames = data.teacherFrames;
  _studentFrames = data.studentFrames;
  
  // Build frame mapping: use pre-computed frameMapping from scoring (audio-aligned or DTW)
  if (data.frameMapping && data.frameMapping.length > 0) {
    // frameMapping is [[teacherTs, studentTs], ...]
    // Build a lookup: for each teacher frame, find the matching student frame
    _mappedIndices = _teacherFrames.map((tf) => {
      // Find the frameMapping entry closest to this teacher frame's ts
      let bestPair = null, bestDist = Infinity;
      for (const [tTs, sTs] of data.frameMapping) {
        const d = Math.abs(tf.ts - tTs);
        if (d < bestDist) { bestDist = d; bestPair = sTs; }
      }
      // Now find the student frame closest to the mapped student time
      let best = 0, bd = Infinity;
      for (let j = 0; j < _studentFrames.length; j++) {
        const d = Math.abs(_studentFrames[j].ts - bestPair);
        if (d < bd) { bd = d; best = j; }
      }
      return best;
    });
  } else {
    // Fallback: simple timestamp matching
    _mappedIndices = _teacherFrames.map((tf) => {
      let best = 0, bestDist = Infinity;
      for (let j = 0; j < _studentFrames.length; j++) {
        const d = Math.abs(_studentFrames[j].ts - tf.ts);
        if (d < bestDist) { bestDist = d; best = j; }
      }
      return best;
    });
  }
  
  const area = document.getElementById('skeletonArea');
  const slider = document.getElementById('frameSlider');
  const canvas = document.getElementById('skeletonCanvas');
  
  area.style.display = 'block';
  slider.max = _teacherFrames.length - 1;
  slider.value = 0;
  
  // Responsive canvas size
  const containerWidth = canvas.parentElement.offsetWidth;
  canvas.width = containerWidth * 2; // retina
  canvas.height = Math.round(containerWidth * 1.25 * 2);
  canvas.style.height = Math.round(containerWidth * 1.25) + 'px';
  
  slider.addEventListener('input', () => {
    drawSkeletonFrame(parseInt(slider.value));
    if (_skeletonPlaying) {
      toggleSkeletonPlay(); // pause on manual scrub
    }
    // Seek audio to scrubbed position (will play on next play)
    const scrubIdx = parseInt(slider.value);
    if (_teacherFrames[scrubIdx]) {
      _audioPauseOffset = _teacherFrames[scrubIdx].ts;
    }
  });
  
  drawSkeletonFrame(0);

  // Load audio from teacher video for skeleton playback
  loadSkeletonAudio();
}

function drawSkeletonFrame(idx) {
  const canvas = document.getElementById('skeletonCanvas');
  const label = document.getElementById('frameLabel');
  
  if (!_teacherFrames || idx >= _teacherFrames.length) return;
  
  const tLms = _teacherFrames[idx].landmarks;
  const sIdx = _mappedIndices[idx];
  const sLms = _studentFrames[sIdx].landmarks;
  const ts = _teacherFrames[idx].ts;
  
  // Normalize both poses: center on hip midpoint, scale torso to match
  const normT = normalizePose(tLms);
  const normS = normalizePoseToRef(sLms, tLms);
  Visualizer.drawFrame(canvas, normT, normS);
  label.textContent = `${ts.toFixed(1)}s / ${_teacherFrames[_teacherFrames.length-1].ts.toFixed(1)}s`;
}

function toggleSkeletonPlay() {
  const icon = document.getElementById('playIcon');
  const slider = document.getElementById('frameSlider');
  
  if (_skeletonPlaying) {
    _skeletonPlaying = false;
    icon.textContent = 'play_arrow';
    if (_skeletonAnimId) cancelAnimationFrame(_skeletonAnimId);
    // Pause audio
    if (_audioCtx && _audioSource) {
      _audioPauseOffset = _audioCtx.currentTime - _audioStartTime;
      try { _audioSource.stop(); } catch(e) {}
      _audioSource = null;
    }
    return;
  }
  
  _skeletonPlaying = true;
  icon.textContent = 'pause';
  
  // Start audio synced to skeleton
  const currentIdx = parseInt(slider.value);
  const currentTs = _teacherFrames[currentIdx] ? _teacherFrames[currentIdx].ts : 0;
  playAudioFrom(currentTs);
  
  let lastTime = 0;
  const fps = 10 * _playSpeed;
  const interval = 1000 / fps;
  
  function animate(time) {
    if (!_skeletonPlaying) return;
    if (time - lastTime >= interval) {
      lastTime = time;
      let idx = parseInt(slider.value) + 1;
      if (idx >= _teacherFrames.length) {
        idx = 0;
        // Restart audio from beginning on loop
        playAudioFrom(0);
      }
      slider.value = idx;
      drawSkeletonFrame(idx);
    }
    _skeletonAnimId = requestAnimationFrame(animate);
  }
  _skeletonAnimId = requestAnimationFrame(animate);
}

async function loadSkeletonAudio() {
  try {
    const db = await openDB();
    const teacherBlob = await new Promise((res, rej) => {
      const tx = db.transaction('videos', 'readonly');
      const req = tx.objectStore('videos').get('teacher');
      req.onsuccess = () => res(req.result); req.onerror = rej;
    });
    if (!teacherBlob) return;
    _audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const arrayBuf = await teacherBlob.arrayBuffer();
    _audioBuffer = await _audioCtx.decodeAudioData(arrayBuf);
  } catch(e) {
    console.warn('Skeleton audio load failed:', e);
  }
}

function playAudioFrom(timeSeconds) {
  if (!_audioCtx || !_audioBuffer) return;
  // Stop any existing source
  if (_audioSource) {
    try { _audioSource.stop(); } catch(e) {}
  }
  _audioSource = _audioCtx.createBufferSource();
  _audioSource.buffer = _audioBuffer;
  _audioSource.playbackRate.value = _playSpeed;
  // Preserve pitch when slowing down (time stretch, not pitch shift)
  if ('preservesPitch' in _audioSource) _audioSource.preservesPitch = true;
  else if ('mozPreservesPitch' in _audioSource) _audioSource.mozPreservesPitch = true;
  _audioSource.connect(_audioCtx.destination);
  const offset = Math.min(timeSeconds, _audioBuffer.duration);
  _audioSource.start(0, offset);
  _audioStartTime = _audioCtx.currentTime - offset;
}

function setPlaySpeed(speed, btn) {
  _playSpeed = speed;
  // Update button styles
  document.querySelectorAll('.speed-btn').forEach(b => {
    b.style.background = '#fff'; b.style.color = '#6B6E7B'; b.style.borderColor = '#E5E6ED';
  });
  btn.style.background = 'linear-gradient(135deg,#8B5CF6,#EC4899)';
  btn.style.color = '#fff'; btn.style.borderColor = 'transparent';
  // If currently playing, restart with new speed
  if (_skeletonPlaying) {
    // Get current position
    const slider = document.getElementById('frameSlider');
    const currentIdx = parseInt(slider.value);
    const currentTs = _teacherFrames[currentIdx] ? _teacherFrames[currentIdx].ts : 0;
    // Restart audio at new speed (preservesPitch keeps it sounding normal)
    if (_audioSource) { try { _audioSource.stop(); } catch(e) {} _audioSource = null; }
    playAudioFrom(currentTs);
    // Restart animation loop with new fps
    if (_skeletonAnimId) cancelAnimationFrame(_skeletonAnimId);
    _skeletonPlaying = false;
    toggleSkeletonPlay();
  }
}


// ─── Pose Normalization ─────────────────────────────────────────
function _hipMid(lms) {
  const lh = lms[23], rh = lms[24];
  if (!lh || !rh) return { x: 0.5, y: 0.5 };
  return { x: (lh.x + rh.x) / 2, y: (lh.y + rh.y) / 2 };
}
function _torsoHeight(lms) {
  // Distance from hip midpoint to shoulder midpoint
  const hm = _hipMid(lms);
  const ls = lms[11], rs = lms[12];
  if (!ls || !rs) return 0.3;
  const sm = { x: (ls.x + rs.x) / 2, y: (ls.y + rs.y) / 2 };
  return Math.sqrt((hm.x - sm.x) ** 2 + (hm.y - sm.y) ** 2) || 0.3;
}
function normalizePose(lms) {
  // Center on hip midpoint at (0.5, 0.55), scale torso to 0.25
  const hm = _hipMid(lms);
  const th = _torsoHeight(lms);
  const scale = 0.25 / th;
  const cx = 0.5, cy = 0.55;
  return lms.map(l => ({
    x: (l.x - hm.x) * scale + cx,
    y: (l.y - hm.y) * scale + cy,
    z: l.z || 0,
    visibility: l.visibility || 0
  }));
}
function normalizePoseToRef(lms, refLms) {
  // Normalize student pose using teacher's hip center as anchor
  const hm = _hipMid(lms);
  const th = _torsoHeight(lms);
  const refTh = _torsoHeight(refLms);
  const scale = 0.25 / th; // same target torso size
  const cx = 0.5, cy = 0.55;
  return lms.map(l => ({
    x: (l.x - hm.x) * scale + cx,
    y: (l.y - hm.y) * scale + cy,
    z: l.z || 0,
    visibility: l.visibility || 0
  }));
}

// ─── Keyframe Comparison (inline) ────────────────────────────────
const KF_LANDMARK_NAMES={0:'鼻子',11:'左肩',12:'右肩',13:'左肘',14:'右肘',15:'左手腕',16:'右手腕',23:'左髀',24:'右髀',25:'左膝',26:'右膝',27:'左脚踝',28:'右脚踝'};
const KF_JOINTS=Object.keys(KF_LANDMARK_NAMES).map(Number);
let _kfAllPairs=[];
let _kfFilter='all';
let _kfDetailOpen=false;

function toggleKfDetail(){
  _kfDetailOpen=!_kfDetailOpen;
  document.getElementById('kfDetail').style.display=_kfDetailOpen?'block':'none';
  document.getElementById('kfToggleIcon').textContent=_kfDetailOpen?'expand_less':'expand_more';
  document.getElementById('kfToggle').innerHTML=`<span class="material-symbols-rounded" style="font-size:18px" id="kfToggleIcon">${_kfDetailOpen?'expand_less':'expand_more'}</span>${_kfDetailOpen?'收起逐帧对比':'展开逐帧对比'}`;
  if(_kfDetailOpen&&_kfAllPairs.length)renderKfFrames(_kfAllPairs);
}

  document.querySelectorAll('.kf-filter').forEach(b=>{
    b.style.background='#fff';b.style.color='#6B6E7B';
  });
  btn.style.background='linear-gradient(135deg,#8B5CF6,#EC4899)';btn.style.color='#fff';
  renderKfFrames(_kfAllPairs);
}

function kfJointDiffs(tLms,sLms){
  const diffs=[];
  for(const ji of KF_JOINTS){
    const t=tLms[ji],s=sLms[ji];
    if(!t||!s)continue;
    if((t.visibility||0)<0.5||(s.visibility||0)<0.5)continue;
    const dist=Math.sqrt((t.x-s.x)**2+(t.y-s.y)**2);
    diffs.push({joint:ji,name:KF_LANDMARK_NAMES[ji],dist});
  }
  diffs.sort((a,b)=>b.dist-a.dist);
  return diffs;
}

async function extractFrame(blob,ts){
  const url=URL.createObjectURL(blob);
  const v=document.createElement('video');
  v.muted=true;v.playsInline=true;v.src=url;
  await new Promise((r,j)=>{v.onloadeddata=r;v.onerror=j;v.load()});
  v.currentTime=ts;
  await new Promise(r=>{v.onseeked=r});
  const c=document.createElement('canvas');
  c.width=v.videoWidth;c.height=v.videoHeight;
  c.getContext('2d').drawImage(v,0,0);
  URL.revokeObjectURL(url);
  return c;
}

function drawKfCanvas(canvas,srcCanvas,landmarks,diffMarkers,isTeacher){
  const ctx=canvas.getContext('2d');
  const w=canvas.width,h=canvas.height;
  ctx.drawImage(srcCanvas,0,0,srcCanvas.width,srcCanvas.height,0,0,w,h);
  ctx.fillStyle='rgba(0,0,0,0.12)';ctx.fillRect(0,0,w,h);
  if(!landmarks)return;
  const CONNS=Visualizer.CONNECTIONS;
  const color=isTeacher?'rgba(108,59,170,0.7)':'rgba(58,190,255,0.7)';
  ctx.strokeStyle=color;ctx.lineWidth=2;
  for(const[a,b]of CONNS){
    if(a>=landmarks.length||b>=landmarks.length)continue;
    const la=landmarks[a],lb=landmarks[b];
    if((la.visibility||0)<0.3||(lb.visibility||0)<0.3)continue;
    ctx.beginPath();ctx.moveTo(la.x*w,la.y*h);ctx.lineTo(lb.x*w,lb.y*h);ctx.stroke();
  }
  ctx.fillStyle=isTeacher?'rgba(180,130,255,1)':'rgba(100,210,255,1)';
  for(const l of landmarks){if((l.visibility||0)<0.3)continue;ctx.beginPath();ctx.arc(l.x*w,l.y*h,3,0,Math.PI*2);ctx.fill();}
  if(!isTeacher&&diffMarkers){
    for(const m of diffMarkers.slice(0,5)){
      const s=landmarks[m.joint];if(!s||(s.visibility||0)<0.3)continue;
      ctx.strokeStyle='#EF4444';ctx.lineWidth=2;
      ctx.beginPath();ctx.arc(s.x*w,s.y*h,8,0,Math.PI*2);ctx.stroke();
      ctx.font='bold 9px sans-serif';ctx.fillStyle='#EF4444';
      ctx.fillText(m.name,s.x*w+10,s.y*h-5);
    }
  }
}

function buildKfSummary(pairs){
  const freq={};
  for(const p of pairs)for(const d of p.diffs.slice(0,5))freq[d.name]=(freq[d.name]||0)+1;
  const sorted=Object.entries(freq).sort((a,b)=>b[1]-a[1]);
  if(!sorted.length)return;
  const el=document.getElementById('kfSummaryItems');
  el.innerHTML=sorted.slice(0,6).map(([name,count])=>{
    const pct=Math.round(count/pairs.length*100);
    const color=pct>=60?'#EF4444':pct>=30?'#F97316':'#10B981';
    return `<div class="kf-summary-item"><span style="min-width:50px;font-weight:600">${name}</span><div class="kf-summary-bar-bg"><div class="kf-summary-bar" style="width:${pct}%;background:${color}"></div></div><span style="min-width:36px;text-align:right;color:${color};font-weight:600">${pct}%</span></div>`;
  }).join('');
}

function renderKfFrames(pairs){
  const container=document.getElementById('kfFrames');
  container.innerHTML='';
  let filtered=pairs;
  if(_kfFilter==='worst')filtered=[...pairs].sort((a,b)=>b.totalDiff-a.totalDiff).slice(0,6);
  else if(_kfFilter==='best')filtered=[...pairs].sort((a,b)=>a.totalDiff-b.totalDiff).slice(0,6);
  for(let i=0;i<filtered.length;i++){
    const p=filtered[i];
    const lvl=p.totalDiff>0.5?'high':p.totalDiff>0.25?'medium':'low';
    const lbl=lvl==='high'?'差异较大':lvl==='medium'?'有差异':'较接近';
    const el=document.createElement('div');el.className='kf-pair';
    el.innerHTML=`<div class="kf-pair-header"><span class="kf-time">${p.ts.toFixed(1)}s</span><span class="kf-tag ${lvl}">${lbl}</span></div><div class="kf-pair-grid"><div><canvas id="kftc${i}" width="360" height="640"></canvas><div class="kf-label">老师</div></div><div><canvas id="kfsc${i}" width="360" height="640"></canvas><div class="kf-label">你</div></div></div><div class="kf-tags" id="kftags${i}"></div>`;
    container.appendChild(el);
    requestAnimationFrame(()=>{
      drawKfCanvas(document.getElementById('kftc'+i),p.tCanvas,p.tLms,null,true);
      drawKfCanvas(document.getElementById('kfsc'+i),p.sCanvas,p.sLms,p.diffs,false);
      document.getElementById('kftags'+i).innerHTML=p.diffs.slice(0,4).map(d=>{const l=d.dist>0.08?'high':d.dist>0.04?'medium':'low';return `<span class="kf-tag ${l}">${d.name}</span>`;}).join('');
    });
  }
}

async function initKeyframeComparison(){
  const loadEl=document.getElementById('kfLoading');
  const sectionEl=document.getElementById('kfSection');
  try{
    const db=await openDB();
    const [tBlob,sBlob,res]=await Promise.all(['teacher','student','result'].map(k=>new Promise((r,j)=>{const tx=db.transaction('videos','readonly');const rq=tx.objectStore('videos').get(k);rq.onsuccess=()=>r(rq.result);rq.onerror=j;})));
    if(!tBlob||!sBlob||!res||!res.teacherFrames||!res.studentFrames||res.teacherFrames.length<3){
      loadEl.innerHTML='<div style="font-size:13px;color:#9B9EAB">完成评分后可查看关键帧对比</div>';return;
    }
    const tFrames=res.teacherFrames,sFrames=res.studentFrames;
    // Map frames using pre-computed frameMapping from scoring
    const fMap=res.frameMapping;
    const mapped=tFrames.map((tf,i)=>{
      let sIdx=i; // fallback
      if(fMap&&fMap.length){
        // Find closest frameMapping entry
        let bestD=Infinity;
        for(const [tTs,sTs] of fMap){
          const d=Math.abs(tf.ts-tTs);
          if(d<bestD){bestD=d;
            // Find student frame index by ts
            let b2=0,bd2=Infinity;
            for(let j=0;j<sFrames.length;j++){const d2=Math.abs(sFrames[j].ts-sTs);if(d2<bd2){bd2=d2;b2=j;}}
            sIdx=b2;
          }
        }
      } else {
        let bd=Infinity;
        for(let j=0;j<sFrames.length;j++){const d=Math.abs(sFrames[j].ts-tf.ts);if(d<bd){bd=d;sIdx=j;}}
      }
      return{tIdx:i,sIdx,ts:tf.ts};
    });
    // Compute diffs
    const withDiffs=mapped.map(p=>{
      const tLms={},sLms={};
      for(const ji of KF_JOINTS){tLms[ji]=tFrames[p.tIdx].landmarks[ji];sLms[ji]=sFrames[p.sIdx].landmarks[ji];}
      const diffs=kfJointDiffs(tLms,sLms);
      return{...p,diffs,totalDiff:diffs.reduce((s,d)=>s+d.dist,0)};
    });
    // Select keyframes: top 60% by diff + 40% evenly
    withDiffs.sort((a,b)=>b.totalDiff-a.totalDiff);
    const n=Math.min(12,withDiffs.length);
    const topN=Math.ceil(n*0.6),evenN=n-topN;
    const sel=new Set();
    for(let i=0;i<Math.min(topN,withDiffs.length);i++)sel.add(withDiffs[i].tIdx);
    const step=Math.floor(tFrames.length/(evenN+1));
    for(let i=1;i<=evenN;i++){const idx=i*step;if(idx<tFrames.length)sel.add(idx);}
    const indices=[...sel].sort((a,b)=>a-b);
    // Extract video frames
    const pairs=[];
    for(let k=0;k<indices.length;k++){
      const tIdx=indices[k];
      const info=withDiffs.find(w=>w.tIdx===tIdx)||{tIdx,sIdx:tIdx,ts:tFrames[tIdx].ts,diffs:[],totalDiff:0};
      const [tc,sc]=await Promise.all([extractFrame(tBlob,tFrames[tIdx].ts),extractFrame(sBlob,sFrames[info.sIdx].ts)]);
      pairs.push({ts:info.ts,tCanvas:tc,sCanvas:sc,tLms:tFrames[tIdx].landmarks,sLms:sFrames[info.sIdx].landmarks,diffs:info.diffs,totalDiff:info.totalDiff});
    }
    _kfAllPairs=pairs;
    buildKfSummary(pairs);
    loadEl.style.display='none';
    sectionEl.style.display='block';
  }catch(e){
    console.error('KF error:',e);
    loadEl.innerHTML='<div style="font-size:13px;color:#9B9EAB">关键帧对比加载失败</div>';
  }
}

// Start keyframe analysis after main render
setTimeout(initKeyframeComparison,500);
</script>
